apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ui-base.name" . }}
spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.host | quote }}
      http:
        paths:
          # UI
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ui-base.name" . }}
                port:
                  number: 80

          # API reverse proxy
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nginx-reverse-proxy
                port:
                  number: 8080
