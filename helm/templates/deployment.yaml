apiVersion: apps/v1
kind: Deployment

metadata:
    name: {{ include "ui-base.name" . }}
    namespace: {{ .Release.Namespace }}

spec:
    replicas: {{ include "ui-base.replicas" . }}
    selector:
        matchLabels:
            app: {{ include "ui-base.name" . }}
    template:
        metadata:
            labels:
                app: {{ include "ui-base.name" . }}
        spec:
            containers:
            - name: {{ include "ui-base.name" . }}
              image: {{ include "ui-base.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              ports:
                - containerPort: 8080

            - name: proxy
              image: nginx:1.29
              ports:
                - containerPort: 80

              volumeMounts:
              - name: nginx-config
                mountPath: /etc/nginx/conf.d

            volumes:
            - name: nginx-config
              configMap:
                name: nginx-reverse-proxy