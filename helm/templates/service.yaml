apiVersion: v1
kind: Service
metadata:
  name: {{ include "ui-base.name" . }}
spec:
  selector:
    app: {{ include "ui-base.name" . }}
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-reverse-proxy
spec:
  selector:
    app: {{ include "ui-base.name" . }}
  ports:
    - port: 80
      targetPort: 80