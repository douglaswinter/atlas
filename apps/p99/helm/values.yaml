ui-base:
  name: p99
  host: p99.diamond.ac.uk

  image:
    repository: ghcr.io/diamondlightsource/atlas/p99
    tag: # Updated by CI job with latest release version

  upstreams:
    - id: blueapi
      path: /api/
      rewriteTarget: /
      target:
        external:
          uri: https://p99-blueapi.diamond.ac.uk/

    - id: workflows
      path: /api/workflows
      rewriteTarget: /graphql
      target:
        external:
          uri: https://workflows.diamond.ac.uk

    - id: supergraph
      path: /api/graphql
      rewriteTarget: /
      target:
        external:
          uri: https://graph-nightly.diamond.ac.uk
      passHostHeader: false

  identityProvider: legacy
