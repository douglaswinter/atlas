ui-base:
  name: p99
  host: p99.diamond.ac.uk

  image:
    repository: ghcr.io/diamondlightsource/atlas/p99
    tag: # Updated by CI job with latest release version

  # Note that if these have changed you may need to manually restart the oauth2-proxy pod on deployment
  upstreams:
    - id: blueapi
      path: /api/blueapi/
      rewriteTarget: /
      target:
        external:
          uri: https://p99-blueapi.diamond.ac.uk/
