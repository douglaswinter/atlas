    proposalCategory: String = null
    first: Int = null
    last: Int = null
    after: String = null
    before: String = null
  ): ProposalConnection!

  """
  Get a instrument session
  """
  instrumentSession(
    proposalNumber: Int!
    instrumentSessionNumber: Int!
