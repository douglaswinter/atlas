ui-base:
  name: visr
  host: visr.diamond.ac.uk

  image:
    repository: ghcr.io/diamondlightsource/atlas/visr
    tag: # Updated by CI job with latest release version

  # Note that if these have changed you may need to manually restart the oauth2-proxy pod on deployment
  upstreams:
    - id: blueapi
      path: /api/blueapi/
      rewriteTarget: /
      target:
        external:
          uri: http://b01-1-blueapi.diamond.ac.uk

    - id: workflows
      path: /api/workflows
      rewriteTarget: /graphql
      target:
        external:
          uri: https://workflows.diamond.ac.uk

    - id: data
      path: /api/data/
      rewriteTarget: /
      target:
        service:
          name: dataserver
          port: 8000

    - id: supergraph
      path: /api/graphql
      rewriteTarget: /graphql
      target:
        external:
          uri: https://graph-nightly.diamond.ac.uk
      passHostHeader: false

  identityProvider: legacy
